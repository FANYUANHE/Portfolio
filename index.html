<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <title>Euan Fan | Frontend Engineer</title>
  <link rel="icon" type="image/png" href="./images/favicon.png" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM (production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Apply saved theme before paint to avoid flash -->
  <script>
    (function() {
      var stored = localStorage.getItem('portfolio-theme');
      if (stored === 'dark' || stored === 'light') document.documentElement.setAttribute('data-theme', stored);
    })();
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Light theme (default) */

    :root,
    [data-theme="light"] {
      --bg-primary: #FAFBFC;
      --bg-secondary: #F1F5F9;
      --text-primary: #0F172A;
      --text-muted: #64748B;
      --accent: #0EA5E9;
      --accent-soft: #E0F2FE;
      --accent-muted: rgba(14, 165, 233, 0.85);
      --border: #E5E7EB;
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(0, 0, 0, 0.08);
    }

    /* Dark theme */

    [data-theme="dark"] {
      --bg-primary: #0B1120;
      --bg-secondary: #111827;
      --text-primary: #E5E7EB;
      --text-muted: #9CA3AF;
      --accent: #38BDF8;
      --accent-soft: rgba(56, 189, 248, 0.15);
      --accent-muted: rgba(56, 189, 248, 0.9);
      --border: rgba(255, 255, 255, 0.08);
      --glass-bg: rgba(17, 24, 39, 0.8);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    html { scroll-behavior: smooth; transition: color 0.25s ease, background-color 0.25s ease; }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .noise-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
    }

    .liquid-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .liquid-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 20s infinite ease-in-out;
    }

    .blob-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #e0f2fe 0%, transparent 70%);
      top: -200px; right: -200px;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #f0f9ff 0%, transparent 70%);
      bottom: -150px; left: -150px;
      animation-delay: -5s;
    }

    .blob-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #bae6fd 0%, transparent 70%);
      top: 50%; left: 50%;
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(50px, -50px) scale(1.1); }
      50% { transform: translate(-30px, 30px) scale(0.9); }
      75% { transform: translate(30px, 50px) scale(1.05); }
    }

    .experience-card-hover:hover { border-color: var(--accent); }

    .experience-company-logo-wrap {
      width: 40px;
      height: 40px;
      min-width: 40px;
      min-height: 40px;
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .experience-company-logo-wrap img {
      width: 100%;
      height: 100%;
      -o-object-fit: contain;
         object-fit: contain;
      -o-object-position: center;
         object-position: center;
      box-sizing: border-box;
      border-radius: 6px;
    }

    .experience-company-logo-fallback {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    @media (min-width: 768px) {
      .experience-company-logo-wrap {
        width: 48px;
        height: 48px;
        min-width: 48px;
        min-height: 48px;
        border-radius: 12px;
      }
      .experience-company-logo-wrap img { border-radius: 8px; }
      .experience-company-logo-fallback { font-size: 1.25rem; }
    }

    .project-card-hover:hover { border-color: var(--accent); }

    .project-screenshot { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }

    .project-phone-frame,
    .project-web-fullbleed {
      overflow: hidden;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    [data-theme="dark"] .project-phone-frame,
    [data-theme="dark"] .project-web-fullbleed {
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
    }

    .project-phone-frame {
      border-radius: 28px;
      aspect-ratio: 9 / 19.5;
      max-width: 280px;
    }

    .project-phone-frame img { display: block; width: 100%; height: 100%; -o-object-fit: cover; object-fit: cover; }

    .project-web-preview { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 16 / 10; }

    .project-web-preview img { display: block; width: 100%; height: 100%; -o-object-fit: cover; object-fit: cover; }

    .project-web-fullbleed {
      width: 100%;
      aspect-ratio: 16 / 8;
    }

    .project-web-fullbleed img { display: block; width: 100%; height: 100%; -o-object-fit: cover; object-fit: cover; }

    .project-carousel-track { display: flex; transition: transform 0.35s ease-out; will-change: transform; flex-wrap: nowrap; }

    .project-carousel-track .project-carousel-slide { flex: 0 0 auto; min-width: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); }

    .project-carousel-track .project-carousel-slide img {
      width: 100%;
      height: 100%;
      -o-object-fit: cover;
         object-fit: cover;
      -o-object-position: left -2px;
         object-position: left -2px;
      display: block;
      image-rendering: auto;
      image-rendering: -webkit-optimize-contrast;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    .project-carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.2s, transform 0.2s; }

    .project-carousel-dot.active { background: var(--accent); transform: scale(1.2); }

    .project-carousel-dot:hover { background: var(--accent-muted); }

    .project-carousel-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 0.75rem 0.5rem;
      margin-top: 0.5rem;
    }

    .project-carousel-btn {
      width: 32px;
      height: 32px;
      min-width: 32px;
      min-height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .project-carousel-btn:hover:not(:disabled) {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: scale(1.05);
    }

    .project-carousel-btn:active:not(:disabled) { transform: scale(0.98); }

    .project-carousel-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .timeline-item { transition: all 0.4s ease; }

    .timeline-item:hover { opacity: 1 !important; }

    .timeline-container:hover .timeline-item:not(:hover) { opacity: 0.3; }

    .magnetic-btn { position: relative; transition: transform 0.3s ease; }

    .accent-glow { box-shadow: 0 0 30px var(--accent-soft); }

    .text-gradient {
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .bento-item {
      border-radius: 20px;
      padding: 2rem;
      transition: all 0.4s ease;
    }

    .bento-item:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
    }

    .bento-item.large { grid-column: span 2; grid-row: span 2; }

    .bento-item.wide { grid-column: span 2; }

    .bento-item.full-width { grid-column: 1 / -1; }

    .bento-item.about-primary {
      border-color: rgba(14, 165, 233, 0.2);
      box-shadow: 0 0 0 1px rgba(14, 165, 233, 0.08);
    }

    .bento-item.about-primary:hover { border-color: var(--accent); }

    [data-theme="dark"] .bento-item.about-primary {
      border-color: rgba(56, 189, 248, 0.2);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.06);
    }

    .about-card-compact { padding: 1.25rem; }

    .about-card-compact .about-module-title { margin-bottom: 0.75rem; }

    /* 右侧三块：紧凑留白 */

    .about-right-card {
      padding: 1rem 1.25rem;
      border-radius: 16px;
      transition: all 0.4s ease;
    }

    .about-right-card .about-module-title { margin-bottom: 0.5rem; }

    .about-right-card p + p { margin-top: 0.25rem; }

    /* About 桌面端：左右两列等高，紧凑间距；左侧一列、右侧一列（覆盖 .bento-item.large 的 span 2） */

    @media (min-width: 769px) {
      #about .bento-grid {
        display: grid;
        grid-template-columns: 1.6fr 1fr;
        grid-template-rows: 1fr;
        gap: 1.25rem;
        align-items: stretch;
      }
      #about .bento-item.about-large {
        grid-column: 1;
        grid-row: 1;
        min-width: 0;
        padding: 1.5rem 1.75rem;
        border-radius: 16px;
      }
      #about .about-right-col {
        grid-column: 2;
        grid-row: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      #about .about-right-col-inner {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        min-height: 100%;
      }
      /* Education / Professional Recognition：按内容自然高度 */
      #about .about-right-col-inner .about-right-card {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
      }
      /* Impact Highlights：撑满剩余空间，内容完整展示无滚动 */
      #about .about-right-col-inner .about-right-card:first-child {
        flex: 1;
        min-height: 0;
      }
      /* Impact Highlights 内部列表填满卡片高度 */
      #about .about-right-col-inner .about-right-card:first-child ul {
        flex: 1;
        min-height: 0;
        overflow-y: visible;
      }
      #about .about-right-col-inner .about-right-col-spacer {
        display: none;
      }
    }

    @media (max-width: 768px) {
      #about .bento-grid {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      #about .bento-item.about-large { flex: none; padding: 2rem; }
      #about .about-right-col {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      #about .about-right-col-inner {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      #about .about-right-col .about-right-col-spacer { display: none; }
    }

    /* 各模块底部向下箭头：统一位置，移动端略紧凑、PC 端留白适中 */

    .section-scroll-arrow {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 1.25rem;
    }

    @media (min-width: 768px) {
      .section-scroll-arrow { bottom: 2.5rem; }
    }

    /* Hero 首屏箭头：移动端距底稍近、PC 与其他模块一致 */

    #hero .section-scroll-arrow {
      bottom: 1rem;
    }

    @media (min-width: 768px) {
      #hero .section-scroll-arrow {
        bottom: 2.5rem;
      }
    }

    ::-webkit-scrollbar { width: 0; background: transparent; }

    .link-underline { position: relative; }

    .link-underline::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .link-underline:hover::after { width: 100%; }

    .link-underline:hover { color: var(--accent); }

    .about-section-label { color: var(--text-muted); letter-spacing: 0.2em; }

    /* About 模块标题 label：与 Hero .hero-section-label 完全一致 */

    .about-module-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .about-module-title i { color: var(--accent); opacity: 0.9; }

    /* 左侧卡片内的次级标题（Key Strengths / Selected Experience） */

    .about-subtitle {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .about-subtitle::before {
      content: '';
      flex-shrink: 0;
      width: 0.2rem;
      height: 0.85rem;
      border-radius: 9999px;
      background: var(--accent);
      opacity: 0.75;
    }

    /* 主标题：Hello, I'm [Name] */

    .about-emphasis-title {
      color: var(--text-primary);
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.15;
    }

    /* 名字部分：与 Hero 渐变一致 */

    .about-name-accent {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 简介段落：清晰易读，无左侧竖线，突出显示 */

    .about-intro-lead {
      color: var(--text-primary);
      font-size: 1rem;
      line-height: 1.7;
      font-weight: 400;
      opacity: 0.92;
    }

    @media (min-width: 768px) {
      .about-intro-lead { font-size: 1.0625rem; }
    }

    /* 高亮列表（aboutHighlights）：文字稍大、稍粗，突出重点 */

    .about-highlight-text {
      font-size: 0.9375rem;
      line-height: 1.55;
      color: var(--text-primary);
      font-weight: 600;
    }

    /* 普通列表（key strengths / impact highlights）：正常权重、稍 muted */

    .about-list-text {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-primary);
      opacity: 0.88;
    }

    .about-body { color: var(--text-primary); }

    .about-body-muted { color: var(--text-muted); }

    .about-detail-text {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .about-quote { color: var(--accent); font-weight: 600; }

    .about-company-link {
      cursor: pointer;
      text-decoration: none;
    }

    .about-company-link:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
      box-shadow: 0 2px 8px rgba(14, 165, 233, 0.2);
    }

    .hero-photo-wrap {
      position: relative;
      border-radius: 1.25rem;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px var(--accent-soft), 0 0 0 1px var(--border);
      aspect-ratio: 4 / 5;
      max-height:  min(85vh, 520px);
    }

    .hero-photo-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: inherit;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent) 0%, transparent 50%, var(--accent) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.4;
      z-index: 1;
      pointer-events: none;
    }

    .hero-photo-wrap img {
      width: 100%;
      height: 100%;
      -o-object-fit: cover;
         object-fit: cover;
      display: block;
    }

    .hero-photo-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, var(--accent-soft) 0%, var(--bg-secondary) 50%, var(--accent-soft) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    /* Hero 模块：层级 + 特色样式（无竖线） */

    .hero-text-block { position: relative; }

    .hero-location {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      transition: border-color 0.25s ease, color 0.25s ease;
    }

    .hero-location:hover { border-color: var(--accent); color: var(--accent); }

    .hero-name-wrap {
      position: relative;
      display: block;
    }

    .hero-name-accent {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(14, 165, 233, 0.25));
    }

    .hero-name-primary { color: var(--text-primary); }

    .hero-title-wrap { position: relative; display: inline-block; }

    .hero-title {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* Hero 三组 section 标题统一：11–12px, 700, 0.12em, 蓝色高亮 */

    .hero-section-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .hero-section-label i { color: var(--accent); opacity: 0.9; }

    .hero-previously-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .hero-company-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.7rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
      background: transparent;
      border: 1px solid #E6EDF5;
      border-radius: 0.75rem;
      text-decoration: none;
      transition: color 0.2s ease, text-decoration-color 0.2s ease;
    }

    .hero-company-pill:hover {
      text-decoration: underline;
      text-underline-offset: 0.25em;
      color: var(--accent);
    }

    .hero-company-pill .hero-company-pill-icon {
      opacity: 0.75;
      width: 0.75rem;
      height: 0.75rem;
      transition: opacity 0.2s ease;
    }

    .hero-company-pill:hover .hero-company-pill-icon { opacity: 1; }

    [data-theme="dark"] .hero-company-pill {
      background: transparent;
      border-color: var(--border);
    }

    .hero-subline-wrap { opacity: 0.95; }

    .hero-subline {
      color: var(--text-primary);
      line-height: 1.6;
    }

    .hero-tech-stack-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 0.75rem;
      align-items: center;
    }

    .hero-tech-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.65rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .hero-tech-pill .hero-tech-pill-check {
      flex-shrink: 0;
      width: 0.75rem;

            delay: 0.1
          });
        }, sectionRef);

        return () => ctx.revert();
      }, []);

      const getSkillColor = (name) => data.skillColors?.[name] || data.colors.accent;

      return (
        <section id="skills" ref={sectionRef} className="py-16 md:py-28 px-4 sm:px-6 relative overflow-hidden">
          <div className="absolute inset-0 pointer-events-none opacity-25" style={{
            background: 'radial-gradient(ellipse 80% 50% at 50% 0%, var(--accent-soft) 0%, transparent 65%)'
          }} />
          <div className="max-w-6xl mx-auto relative">
            <h2 className="skills-title text-sm tracking-[0.3em] uppercase mb-10 md:mb-14 skills-section-title">
              {ui.sectionLabel}
            </h2>

            <div className="grid md:grid-cols-2 gap-8 md:gap-10 lg:gap-12">
              {data.skillsGroups.map((group, gIndex) => (
                <div key={gIndex} className="skills-group skills-group-card">
                  <h3 className="text-sm sm:text-base font-semibold tracking-wide mb-3 md:mb-4 flex items-center gap-2 md:gap-2.5" style={{ color: 'var(--text-muted)' }}>
                    <span className="inline-flex items-center justify-center w-7 h-7 sm:w-8 sm:h-8 rounded-lg flex-shrink-0" style={{ background: 'var(--accent-soft)', color: 'var(--accent)' }}>
                      <i data-lucide={gIndex === 0 ? 'code-2' : 'wrench'} className="w-3.5 h-3.5 sm:w-4 sm:h-4" />
                    </span>
                    <span style={{ color: 'var(--text-primary)' }}>{group.title}</span>
                  </h3>
                  <div className="flex flex-wrap gap-1.5 md:gap-2">
                    {group.items.map((item, i) => {
                      const color = getSkillColor(item);
                      const lightBg = ['#F7DF1E', '#61DAFB', '#FFCC00', '#8DD6F9', '#4FC08D'].includes(color);
                      const pillTextColor = theme === 'dark' ? 'var(--text-primary)' : (lightBg ? 'rgba(26,26,46,0.92)' : 'var(--text-primary)');
                      return (
                        <span
                          key={i}
                          className="skill-pill inline-flex items-center pl-2.5 pr-2 py-1 rounded-md text-xs sm:text-sm font-medium border transition-all duration-250"
                          style={{
                            '--skill-color': color,
                            background: `linear-gradient(135deg, ${color}14 0%, ${color}06 100%)`,
                            color: pillTextColor,
                            borderColor: `${color}22`
                          }}
                          onMouseEnter={(e) => {
                            e.currentTarget.style.boxShadow = `0 4px 14px -4px ${color}38`;
                            e.currentTarget.style.borderColor = `${color}45`;
                            e.currentTarget.style.background = `linear-gradient(135deg, ${color}20 0%, ${color}10 100%)`;
                          }}
                          onMouseLeave={(e) => {
                            e.currentTarget.style.boxShadow = '';
                            e.currentTarget.style.borderColor = `${color}22`;
                            e.currentTarget.style.background = `linear-gradient(135deg, ${color}14 0%, ${color}06 100%)`;
                          }}
                        >
                          <span className="relative z-10">{item}</span>
                        </span>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="section-scroll-arrow">
            <a href="#contact" className="block text-current animate-bounce" aria-label="Scroll to Contact">
              <i data-lucide="chevron-down" className="w-6 h-6 opacity-60" />
            </a>
          </div>
        </section>
      );
    };

    const Footer = ({ data, lang }) => {
      const ui = UI_TEXT[lang].footer;
      const sectionRef = useRef(null);

      useEffect(() => {
        const ctx = gsap.context(() => {
          gsap.from(".footer-content > *", {
            scrollTrigger: {
              trigger: sectionRef.current,
              start: "top 70%",
              toggleActions: "play none none reverse"
            },
            y: 60,
            opacity: 0,
            duration: 1,
            stagger: 0.15,
            ease: "power3.out"
          });
        }, sectionRef);

        return () => ctx.revert();
      }, []);

      return (
        <footer id="contact" ref={sectionRef} className="min-h-[70vh] flex flex-col justify-center py-20 md:py-28 px-4 sm:px-6 relative">
          <div className="footer-content max-w-6xl mx-auto text-center w-full">
            <p className="footer-label mb-6 md:mb-8">{ui.connect}</p>

            <h2 className="footer-title text-3xl sm:text-4xl md:text-5xl lg:text-6xl xl:text-7xl tracking-tighter mb-2 md:mb-3">
              {ui.titleMain} <span className="footer-title-accent">{ui.titleAccent}</span>
            </h2>
            <p className="footer-tagline mb-6 md:mb-8">
              {ui.tagline}
            </p>
            {data.heroVisa && (
              <p className="footer-visa mb-8 md:mb-10">
                <i data-lucide="check-circle" className="w-4 h-4 flex-shrink-0" />
                <span>{data.heroVisa}</span>
              </p>
            )}

            <div className="w-full flex justify-center mb-8 md:mb-10">
              <a
                href={`mailto:${data.email}`}
                className="footer-cta inline-flex items-center gap-2"
              >
                <i data-lucide="mail" className="w-4 h-4 md:w-5 md:h-5 flex-shrink-0" />
                <span>{data.email}</span>
              </a>
            </div>

            <p className="footer-connect-label mb-3 md:mb-4">{ui.findMe}</p>
            <div className="flex justify-center gap-3 sm:gap-4 mb-12 md:mb-14">
              <a href={data.social.github} target="_blank" rel="noopener noreferrer" aria-label="GitHub"
                 className="footer-social-link">
                <i data-lucide="github" className="w-5 h-5" />
              </a>
              <a href={data.social.linkedin} target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"
                 className="footer-social-link">
                <i data-lucide="linkedin" className="w-5 h-5" />
              </a>
              <a href={`mailto:${data.email}`} aria-label="Email"
                 className="footer-social-link">
                <i data-lucide="mail" className="w-5 h-5" />
              </a>
            </div>

            <div className="pt-6 md:pt-8 border-t footer-border">
              <p className="footer-copy text-xs">© {new Date().getFullYear()} {data.name}. {ui.builtWith}</p>
            </div>
          </div>
        </footer>
      );
    };

    const App = () => {
      const [theme, setTheme] = useState(getInitialTheme);
      const [lang, setLang] = useState(getInitialLang);
      const data = lang === 'zh' ? profileDataZh : profileDataEn;

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
      }, [theme]);

      useEffect(() => {
        lucide.createIcons();
        gsap.registerPlugin(ScrollTrigger);
        ScrollTrigger.refresh();
        return () => ScrollTrigger.getAll().forEach((t) => t.kill());
      }, []);

      useEffect(() => {
        setTimeout(() => lucide.createIcons(), 50);
      }, [lang]);

      return (
        <>
          <LiquidBackground />
          <div className="noise-overlay" />
          <Navigation theme={theme} setTheme={setTheme} lang={lang} setLang={setLang} />
          <main>
            <Hero data={data} lang={lang} />
            <About data={data} lang={lang} />
            <Experience data={data} lang={lang} />
            <Projects data={data} lang={lang} />
            <Skills data={data} theme={theme} lang={lang} />
            <Footer data={data} lang={lang} />
          </main>
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
